        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>

<body>
    <iframe id="gameFrame" 
            src="https://ordinals.com/content/513ce5fa94bc2b01240904b70c29af19a0db94bef019633a828571698cb11177i0"
            allow="accelerometer; autoplay; gyroscope; fullscreen;"
            sandbox="allow-scripts allow-same-origin allow-pointer-lock"
            style="width:100%; height:100%; border:none;">
    </iframe>

    <script>
        // Some Ordinal queues pause if the iframe isn't 'active'
        const frame = document.getElementById('gameFrame');
        
        // Kickstart the interaction 
        window.addEventListener('load', () => {
            frame.focus();
            // Simulate a click/interaction to wake up the Audio/JS context
            document.body.dispatchEvent(new MouseEvent('click'));
        });

        // Log if the frame is actually responding
        window.onmessage = function(e) {
            console.log("Message from Inscription:", e.data);
        };
    </script>
</body>
