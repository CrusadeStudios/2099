        iframe {

            top: 0;

        #fs-button {

            cursor: pointer;
            backdrop-filter: blur(5px);

        }

        #fs-button:hover {
            background: rgba(255, 255, 255, 0.2);

        /* Hide button when in actual fullscreen if desired */
        :fullscreen #fs-button { opacity: 0.5; }
    </style>
